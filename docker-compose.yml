# Neo4j is the canonical store for Argus's knowledge network.
# Bound to 127.0.0.1 only: reachable from the server itself (and over your
# Tailscale/SSH tunnel), never exposed on the LAN. Data lives in ./data/neo4j
# (gitignored); back it up with scripts/backup.sh.
services:
  neo4j:
    image: neo4j:5-community
    container_name: argus-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"   # HTTP browser UI
      - "127.0.0.1:7687:7687"   # Bolt (driver protocol)
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512M"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
